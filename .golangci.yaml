version: "2"
run:
  # If set, we pass it to "go list -mod={option}". From "go help modules":
  # If invoked with -mod=readonly, the go command is disallowed from the implicit
  # automatic updating of go.mod described above. Instead, it fails when any changes
  # to go.mod are needed. This setting is most useful to check that go.mod does
  # not need updates, such as in a continuous integration and testing system.
  # If invoked with -mod=vendor, the go command assumes that the vendor
  # directory holds the correct copies of dependencies and ignores
  # the dependency descriptions in go.mod.
  #
  # Allowed values: readonly|vendor|mod
  # Default: ""
  modules-download-mode: readonly

  # Include test files or not.
  # Default: true
  tests: false

linters:
  default: all

  disable:
    # Not useful
    - depguard
    # Banning TODO/FIXME outright removes useful context from the codebase
    - godox
    # Not terribly useful and ends up in too much boilerplate
    - exhaustruct
    # https://github.com/italia/developers-italia-api/issues/190)
    # Don't feel about chasing this one down
    - musttag
    # Meh
    - noinlineerr
    # Deprecated
    - wsl

    # More false positive than actual issues
    - mnd

    # TODO: fix and enable these
    - cyclop
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - nestif
    - revive
    - tagliatelle
    - varnamelen
    - gocyclo

  settings:
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        # PublicCode is the primary return type of the public API
        - github.com/italia/publiccode-parser-go/v5.PublicCode
    lll:
      line-length: 120
    wrapcheck:
      ignore-sigs:
        # No point in wrapping these
        - func encoding/json.Marshal(v any)
        - func encoding/json.UnmarshalJSON(v any)

        # Defaults
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
    funlen:
      # Increase the number of lines, considering funlen counts comments as well
      # (https://github.com/ultraware/funlen/issues/12)
      #
      # default: 60
      lines: 80
    usetesting:
      context-background: true
      context-todo: true
      os-chdir: true
      os-mkdir-temp: true
      os-setenv: true
      os-create-temp: true
      os-temp-dir: false
    forbidigo:
      forbid:
        - pattern: ^(fmt\.Print(|f|ln)|print|println)$
        - pattern: ^panic$
        - pattern: ^log\.Fatal.*$
        - pattern: ^os\.Exit$

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Allow prints and panics in publiccode-parser/, as it's the
      # CLI tool.
      - path: publiccode-parser/
        linters:
          - forbidigo
      # Struct field tag lines can't be shortened without readability loss.
      - linters: [lll]
        source: '`[^`]+`\s*$'

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
